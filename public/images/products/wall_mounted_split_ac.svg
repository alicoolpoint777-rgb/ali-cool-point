<svg width="400" height="250" viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Premium Background Gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="chassis" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="airflow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" rx="16" fill="url(#bg)"/>

  <!-- Airflow aura -->
  <path d="M70 125 C 100 170, 300 170, 330 125" fill="none" stroke="url(#airflow)" stroke-width="24" stroke-linecap="round" opacity="0.8"/>

  <!-- AC Main Body Shadow -->
  <rect x="48" y="74" width="304" height="60" rx="10" fill="url(#shadow)" filter="blur(6px)"/>

  <!-- AC Chassis -->
  <rect x="50" y="70" width="300" height="52" rx="8" fill="url(#chassis)" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Top Air Intake grill lines -->
  <rect x="65" y="74" width="270" height="6" rx="2" fill="#cbd5e1" opacity="0.6"/>
  
  <!-- Deflector Louver (bottom flap) -->
  <rect x="58" y="116" width="284" height="4" rx="2" fill="#94a3b8"/>
  <rect x="58" y="112" width="284" height="2" fill="#e2e8f0"/>

  <!-- Brand logo mark -->
  <text x="200" y="100" fill="#94a3b8" font-size="8" font-weight="bold" font-family="system-ui, sans-serif" letter-spacing="2" text-anchor="middle">PEARL</text>

  <!-- Digital Temperature Display -->
  <rect x="290" y="86" width="32" height="18" rx="4" fill="#0f172a"/>
  <text x="306" y="99" fill="#38bdf8" font-size="11" font-weight="bold" font-family="monospace" text-anchor="middle">24°</text>
  <circle cx="316" cy="90" r="1.5" fill="#22c55e" /> <!-- Green power light -->
</svg>
