<svg width="400" height="250" viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-windfree" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="chassis-wf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="shadow-wf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cool-aura" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Micro holes pattern representation -->
    <pattern id="microholes" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#cbd5e1" opacity="0.75"/>
    </pattern>
  </defs>

  <rect width="400" height="250" rx="16" fill="url(#bg-windfree)"/>

  <!-- Soft dispersed cool aura -->
  <rect x="50" y="115" width="300" height="70" fill="url(#cool-aura)" opacity="0.7"/>

  <!-- Shadow -->
  <rect x="48" y="74" width="304" height="60" rx="10" fill="url(#shadow-wf)" filter="blur(6px)"/>

  <!-- AC Chassis -->
  <rect x="50" y="70" width="300" height="52" rx="8" fill="url(#chassis-wf)" stroke="#99f6e4" stroke-width="1.5"/>

  <!-- Micro-holes front panel -->
  <rect x="58" y="80" width="284" height="34" rx="2" fill="url(#microholes)" />

  <!-- Logo and Display -->
  <rect x="290" y="88" width="32" height="18" rx="4" fill="#0f172a" opacity="0.9"/>
  <text x="306" y="101" fill="#2dd4bf" font-size="11" font-weight="bold" font-family="monospace" text-anchor="middle">22°</text>
  
  <text x="200" y="101" fill="#0d9488" font-size="8" font-weight="black" font-family="system-ui, sans-serif" letter-spacing="2" text-anchor="middle">WIND-FREE</text>

  <!-- Closed flap indicater -->
  <line x1="58" y1="116" x2="342" y2="116" stroke="#e2e8f0" stroke-width="1.5"/>
</svg>
